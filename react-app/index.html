<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>오늘의 시황</title>
    <!-- 캘린더 탭 배경(PhotoBackground.jsx, index.css의 [data-theme] 스왑) 미리 받기 —
         테마 토글이 CSS만으로 즉시 일어나므로, 현재 테마+반대 테마의 이미지를 여기서
         미리 받아두지 않으면 토글 순간 네트워크 왕복이 끼어들어 배경이 잠깐 비거나
         깜빡인다. 다크는 index.css에서 뷰포트 분기가 없어(단일 이미지) media 없이
         항상 받고, 라이트는 데스크톱/모바일 크롭이 갈리므로(index.css의
         @media (max-width: 768px) 분기와 정확히 일치하는 min-width:769px/
         max-width:768px) 뷰포트에 맞는 한 장만 받는다 — 그 결과 어느 뷰포트에서도
         실제 다운로드는 다크 1장 + 라이트(그 뷰포트에 맞는 크롭) 1장, 총 2장뿐이다. -->
    <link rel="preload" as="image" href="/bg/forest-calendar.webp" />
    <link rel="preload" as="image" href="/bg/forest-calendar-light.webp" media="(min-width: 769px)" />
    <link rel="preload" as="image" href="/bg/forest-calendar-light-mobile.webp" media="(max-width: 768px)" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
