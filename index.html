<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>오늘의 시황</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #070c18;
      --bg-card:   #0d1528;
      --border:    #1a2540;
      --border-h:  #2e4470;
      --text-1:    #e2e8f4;
      --text-2:    #7a8ba8;
      --text-3:    #3d5070;
      --gold:      #f0a500;
      --gold-dim:  rgba(240,165,0,.13);
      --up:        #e84040;
      --up-dim:    rgba(232,64,64,.11);
      --down:      #3d82ef;
      --down-dim:  rgba(61,130,239,.11);
      --flat:      #576880;
      --flat-dim:  rgba(87,104,128,.11);
    }

    html { background: var(--bg); }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                   'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 헤더 ─────────────────────────────────── */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px 9px;
      background: rgba(7,12,24,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .header-title { font-size: 17px; font-weight: 800; letter-spacing: -.3px; line-height: 1.2; }
    .header-title em { font-style: normal; color: var(--gold); }
    .header-sub { font-size: 10px; color: var(--text-3); margin-top: 2px; }
    .header-actions { display: flex; gap: 7px; }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--bg-card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-2);
      transition: border-color .15s, color .15s;
    }
    .icon-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── 페이지 컨테이너 ──────────────────────── */
    .page {
      flex: 1;
      display: none;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .page.active { display: flex; }

    /* ── 갱신 바 ──────────────────────────────── */
    .refresh-bar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 6px 16px 4px;
      font-size: 10.5px; color: var(--text-2);
    }
    .pulse-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── 카테고리 탭 ──────────────────────────── */
    .tabs {
      flex-shrink: 0;
      display: flex; gap: 7px;
      padding: 6px 16px 9px;
    }
    .tab {
      padding: 5px 15px; border-radius: 16px;
      font-size: 12.5px; font-weight: 700;
      cursor: pointer; border: 1.5px solid var(--border);
      background: transparent; color: var(--text-2);
      transition: background .15s, border-color .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { background: var(--gold); border-color: var(--gold); color: #1a0e00; }
    .tab:not(.active):hover { border-color: var(--gold); color: var(--gold); }

    /* ── 카드 그리드 ──────────────────────────── */
    .grid {
      flex: 1; min-height: 0; overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      /* grid-template-rows: JS로 동적 설정 */
      gap: 8px;
      padding: 0 9px 9px;
    }
    /* 카드가 1개일 때 전체 너비 사용 */
    .grid.solo { grid-template-columns: 1fr; }

    /* ── 카드 ─────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 11px 11px 9px;
      display: flex; flex-direction: column;
      overflow: hidden; position: relative;
      transition: border-color .18s;
      cursor: default;
      min-height: 0;
    }
    /* 컬러 상단 바 */
    .card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      border-radius: 13px 13px 0 0;
      opacity: 0; transition: opacity .18s;
    }
    .card.up::before   { background: var(--up);   }
    .card.down::before { background: var(--down);  }
    .card.flat::before { background: var(--flat);  }
    .card:hover::before { opacity: 1; }
    .card:hover { border-color: var(--border-h); }

    /* 카드 상단 (고정 높이) */
    .card-top { flex-shrink: 0; }

    .card-name-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 6px;
    }
    .card-name {
      font-size: 11px; font-weight: 700; color: var(--text-2);
      border-bottom: 1.5px solid var(--gold); padding-bottom: 1px;
      line-height: 1.3;
    }
    .card-cat {
      font-size: 8.5px; font-weight: 600; color: var(--text-3);
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 4px;
      flex-shrink: 0; margin-left: 4px; margin-top: 1px;
    }
    .card-price {
      font-size: 20px; font-weight: 800; color: var(--text-1);
      letter-spacing: -1px; line-height: 1;
      margin-bottom: 5px; font-variant-numeric: tabular-nums;
    }
    .card-change {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700;
    }
    .card-change.up   { color: var(--up);   }
    .card-change.down { color: var(--down);  }
    .card-change.flat { color: var(--flat);  }
    .change-chip {
      display: inline-flex; align-items: center;
      padding: 2px 5px; border-radius: 4px;
      font-size: 10.5px; font-variant-numeric: tabular-nums;
    }
    .card-change.up   .change-chip { background: var(--up-dim);   }
    .card-change.down .change-chip { background: var(--down-dim);  }
    .card-change.flat .change-chip { background: var(--flat-dim);  }
    .change-pct { font-variant-numeric: tabular-nums; }

    /* 스파크라인 영역 (가변 높이) */
    .card-spark {
      flex: 1; min-height: 36px;
      overflow: hidden;
      margin: 7px -11px 0;   /* 카드 좌우 가장자리까지 블리드 */
    }
    .spark-empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; font-size: 10px; color: var(--text-3);
    }

    /* 카드 하단 메타 (고정 높이) */
    .card-bottom {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding-top: 6px; margin-top: 6px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .card-meta-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .meta-label { font-size: 8.5px; color: var(--text-3); }
    .source-tag {
      font-size: 8.5px; font-weight: 700; color: var(--gold);
      background: var(--gold-dim); border-radius: 3px; padding: 1px 5px;
    }
    .meta-time {
      font-size: 8.5px; color: var(--text-3);
      font-variant-numeric: tabular-nums;
      max-width: 116px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    /* 상태 메시지 (로딩/에러/빈 결과) */
    .state-wrap {
      grid-column: 1 / -1; align-self: stretch;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text-2);
      text-align: center; padding: 24px;
    }
    .state-wrap p   { font-size: 13px; line-height: 1.6; }
    .state-wrap small { font-size: 11px; color: var(--text-3); display: block; margin-top: 8px; }
    .state-wrap.error { color: var(--up); }
    .state-wrap.error small { color: var(--text-3); }

    /* 플레이스홀더 페이지 */
    .ph-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text-3);
    }
    .ph-icon { opacity: .3; }
    .ph-title { font-size: 15px; font-weight: 700; color: var(--text-2); }
    .ph-sub   { font-size: 12.5px; }

    /* ── 하단 내비게이션 ──────────────────────── */
    .bottom-nav {
      flex-shrink: 0;
      display: flex; align-items: flex-start; justify-content: space-around;
      padding-top: 9px;
      padding-bottom: env(safe-area-inset-bottom, 6px);
      height: calc(60px + env(safe-area-inset-bottom, 0px));
      background: rgba(13,21,40,.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      color: var(--text-3); font-size: 9.5px; font-weight: 600;
      cursor: pointer; background: none; border: none;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item.active { color: var(--gold); }
    .nav-item:not(.active):hover { color: var(--text-2); }
  </style>
</head>
<body>

<!-- ── 헤더 ──────────────────────────────────────── -->
<header class="header">
  <div>
    <div class="header-title">오늘의 <em>시황</em></div>
    <div class="header-sub">실시간 주요 증시 · 15분 지연</div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" title="설정">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                 a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                 A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                 l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                 A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                 l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                 a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                 l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                 a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button class="icon-btn" title="다크모드">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<!-- ── 홈 페이지 ──────────────────────────────────── -->
<div id="page-home" class="page active">
  <div class="refresh-bar">
    <div class="pulse-dot"></div>
    <span id="updatedAt">데이터 로딩 중…</span>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab active" role="tab" data-cat="전체">전체</button>
    <button class="tab"        role="tab" data-cat="지수">지수</button>
    <button class="tab"        role="tab" data-cat="환율">환율</button>
    <button class="tab"        role="tab" data-cat="크립토">크립토</button>
  </div>
  <main class="grid" id="cardGrid" aria-live="polite"></main>
</div>

<!-- ── 차트 페이지 ────────────────────────────────── -->
<div id="page-chart" class="page">
  <div class="ph-wrap">
    <div class="ph-icon">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6"  y1="20" x2="6"  y2="14"/>
      </svg>
    </div>
    <p class="ph-title">차트</p>
    <p class="ph-sub">준비 중입니다</p>
  </div>
</div>

<!-- ── 검색 페이지 ────────────────────────────────── -->
<div id="page-search" class="page">
  <div class="ph-wrap">
    <div class="ph-icon">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <p class="ph-title">검색</p>
    <p class="ph-sub">준비 중입니다</p>
  </div>
</div>

<!-- ── 내 정보 페이지 ─────────────────────────────── -->
<div id="page-profile" class="page">
  <div class="ph-wrap">
    <div class="ph-icon">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <p class="ph-title">내 정보</p>
    <p class="ph-sub">준비 중입니다</p>
  </div>
</div>

<!-- ── 하단 내비게이션 ────────────────────────────── -->
<nav class="bottom-nav" aria-label="하단 메뉴">
  <button class="nav-item active" data-page="home">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>홈</span>
  </button>
  <button class="nav-item" data-page="chart">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6"  y1="20" x2="6"  y2="14"/>
    </svg>
    <span>차트</span>
  </button>
  <button class="nav-item" data-page="search">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <span>검색</span>
  </button>
  <button class="nav-item" data-page="profile">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>내 정보</span>
  </button>
</nav>

<script>
  // ── 상수 ─────────────────────────────────────────────
  const COLOR = { up: '#e84040', down: '#3d82ef', flat: '#576880' };
  const ARROW = { up: '▲', down: '▼', flat: '-' };
  const PAGE_IDS = { home:'page-home', chart:'page-chart', search:'page-search', profile:'page-profile' };

  let allItems = [], activeCat = '전체';

  // ── 숫자 포맷 ─────────────────────────────────────────
  const fp   = n => n.toLocaleString('ko-KR', { minimumFractionDigits:2, maximumFractionDigits:2 });
  const fc   = n => (n > 0 ? '+' : '') + fp(n);
  const fpct = n => (n > 0 ? '+' : '') + n.toFixed(2) + '%';

  // ── Catmull-Rom → cubic Bézier 스무스 패스 ───────────
  function smoothPath(pts) {
    if (pts.length < 2) return `M${pts[0][0]},${pts[0][1]}`;
    const d = [`M${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`];
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[Math.max(0, i - 1)];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[Math.min(pts.length - 1, i + 2)];
      const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
      const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
      const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
      const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
      d.push(`C${cp1x.toFixed(2)},${cp1y.toFixed(2)},${cp2x.toFixed(2)},${cp2y.toFixed(2)},${p2[0].toFixed(2)},${p2[1].toFixed(2)}`);
    }
    return d.join('');
  }

  // ── 스파크라인 SVG 문자열 생성 ────────────────────────
  function drawSparkline(history, dir) {
    const color = COLOR[dir] || COLOR.flat;

    if (!Array.isArray(history) || history.length < 2) {
      return `<div class="spark-empty">데이터 없음</div>`;
    }

    const W = 200, H = 54, padY = 4;
    const prices = history.map(h => h.close);
    const lo  = Math.min(...prices);
    const hi  = Math.max(...prices);
    const rng = hi - lo || hi * 0.005 || 1;
    const n   = prices.length;

    const pts = prices.map((p, i) => [
      (i / (n - 1)) * W,
      (H - padY) - ((p - lo) / rng) * (H - 2 * padY)
    ]);

    const line = smoothPath(pts);
    const last = pts[pts.length - 1];
    const area = `${line}L${last[0].toFixed(2)},${H}L0,${H}Z`;

    const gid = 'g' + Math.random().toString(36).slice(2, 9);

    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"
                 style="width:100%;height:100%;display:block">
      <defs>
        <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="${color}" stop-opacity=".32"/>
          <stop offset="100%" stop-color="${color}" stop-opacity=".02"/>
        </linearGradient>
      </defs>
      <path d="${area}" fill="url(#${gid})"/>
      <path d="${line}" stroke="${color}" stroke-width="2"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  // ── 카드 렌더링 (React 전환 대비: 순수 함수, DOM 반환) ──
  function renderCard(item) {
    const dir = item.direction;
    const el  = document.createElement('article');
    el.className = `card ${dir}`;
    el.innerHTML = `
      <div class="card-top">
        <div class="card-name-row">
          <span class="card-name">${item.name}</span>
          <span class="card-cat">${item.category}</span>
        </div>
        <div class="card-price">${fp(item.price)}</div>
        <div class="card-change ${dir}">
          <span class="change-chip">${ARROW[dir]} ${fc(item.change)}</span>
          <span class="change-pct">${fpct(item.change_pct)}</span>
        </div>
      </div>
      <div class="card-spark">${drawSparkline(item.history || [], dir)}</div>
      <div class="card-bottom">
        <div class="card-meta-row">
          <span class="meta-label">출처</span>
          <span class="source-tag">${item.source}</span>
        </div>
        <div class="card-meta-row">
          <span class="meta-label">기준</span>
          <span class="meta-time">${item.as_of}</span>
        </div>
      </div>`;
    return el;
  }

  // ── 그리드 렌더링 ─────────────────────────────────────
  function renderGrid(cat) {
    const grid = document.getElementById('cardGrid');
    grid.innerHTML = '';

    const list = cat === '전체' ? allItems : allItems.filter(it => it.category === cat);

    if (!list.length) {
      grid.classList.remove('solo');
      grid.style.gridTemplateRows = '1fr';
      grid.innerHTML = `<div class="state-wrap"><p>해당 카테고리에 데이터가 없습니다</p></div>`;
      return;
    }

    // 카드가 1개면 단일 열, 2개 이상이면 2열 그리드
    const isSolo = list.length === 1;
    grid.classList.toggle('solo', isSolo);

    // 행 수를 동적으로 설정해 카드가 그리드 높이를 균등하게 채움
    const cols    = isSolo ? 1 : 2;
    const rowCount = Math.ceil(list.length / cols);
    grid.style.gridTemplateRows = Array(rowCount).fill('1fr').join(' ');

    list.forEach(item => grid.appendChild(renderCard(item)));
  }

  // ── 카테고리 탭 ───────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      activeCat = tab.dataset.cat;
      renderGrid(activeCat);
    });
  });

  // ── 하단 내비게이션 (페이지 전환) ─────────────────────
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const target = PAGE_IDS[btn.dataset.page];
      Object.values(PAGE_IDS).forEach(id => {
        document.getElementById(id).classList.toggle('active', id === target);
      });
    });
  });

  // ── 데이터 로드 ───────────────────────────────────────
  async function loadData() {
    const grid = document.getElementById('cardGrid');
    grid.style.gridTemplateRows = '1fr';
    grid.innerHTML = `<div class="state-wrap"><p>데이터 불러오는 중…</p></div>`;

    try {
      const resp = await fetch('market_data.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      if (!Array.isArray(data.items)) throw new Error('items 배열 없음');

      allItems = data.items;
      document.getElementById('updatedAt').textContent =
        '마지막 갱신 : ' + (data.updated_at ?? '알 수 없음');

      renderGrid(activeCat);
    } catch (err) {
      grid.style.gridTemplateRows = '1fr';
      grid.innerHTML = `<div class="state-wrap error">
        <p>데이터 로드 실패: ${err.message}
        <small>
          브라우저에서 직접 열면 CORS로 fetch가 차단됩니다.<br>
          아래 명령으로 로컬 서버를 실행하세요.<br><br>
          <code style="background:#0d1528;padding:3px 9px;border-radius:5px;
                       font-family:monospace;font-size:11px;color:#f0a500">
            python -m http.server 8000
          </code>
        </small></p>
      </div>`;
      document.getElementById('updatedAt').textContent = '로드 실패';
    }
  }

  loadData();
</script>
</body>
</html>
